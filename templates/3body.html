<div id="loading" class="fadeInDiv"></div>
<div id="myHDturn">
	<progress value="0" max="100" class="loading-progress-bar"></progress>
	<p class="loading-progress-text">Loading HD 0%</p>
</div>
<div id="contIntro" class="hidden" aria-hidden="true">
	<img id="logoIntro" alt="Logotipo de la aplicación">

	<div class="seccion-introductoria" id="seccIntro">

		<div class="modal-intro">
			<h2 idiomax="introTtl" id="introTtl"></h2>
			<p idiomax="introPrf" id="textContIntro"></p>
			<div id="myturn">
				<span><span idiomax="loading" id="loading" class="display-contents">Cargando </span>0%</span>
				<progress value="3" max="100"></progress>
			</div>
		</div>

		<div class="desarrollado-por" aria-label="Créditos de desarrollo">
			<div><span idiomax="devBy" id="devBy">Desarrollado por</span>&nbsp;</div>
			<img src="skin/terre3.svg" alt="Logotipo Terre3">
		</div>
	</div>
</div>

<a id="logo-terre3-right-bottom" href="https://terre3.es" target="_blank"
	title="Abrir sitio web de Terre3" aria-label="Abrir sitio web de Terre3 en una nueva pestaña">
	<img src="skin/cornerTR3.svg" alt="logo-placeholder">
</a>

<p id="GPSaccuration" role="status" aria-live="polite"></p>

<div id="groundModalWin" class="hidden" aria-hidden="true" style="display:none;"></div>
<section id="contModalWin" class="hidden" aria-hidden="true" style="display:none;">
	<article id="cardModalWin" aria-label="Ventana de información del recorrido">
		<div id="card__title">
			<img src="skin/icon-close.svg" alt="Cerrar ventana emergente"
				title="Cerrar ventana"
				role="button" tabindex="0" aria-label="Cerrar ventana"
				onclick="closeContModalWin();">
		</div>
		<div id="card__body">
		</div>
	</article>
</section>

<div id="map" class="map" role="region" aria-label="Mapa 3D interactivo"></div>
<div id="TR3" class="TR3" aria-hidden="true"></div>
<div id="tools" class="tools" aria-hidden="true"></div>
<div id="info" class="tools" aria-hidden="true"></div>

<div id="progress"></div>

<div class="botones-top-left">

</div>

<button type="button" id="buttonCright" class="fa-regular fa-copyright"
	title="Información legal y créditos" aria-label="Abrir información legal y créditos" onclick="buttonCrightFn(this)"> </button>

<div class="botones-top-right">

		<button
			type="button"
			id="downTrack"
			class="btn-circular ItemInactive"
			title="Abrir información del recorrido">

					stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
			</svg>
			<span idiomax="downTrack">Información</span>
		</button>

<div class="botones-down-zoom">

	<button type="button" id="zoom+" class="btn-circular ItemInactive" title="Acercar zoom"
		aria-label="Acercar zoom" onclick="moveForward(1);">
		<svg class="btn-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"
			xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">

				fill="currentColor" stroke="currentColor" />

	</button>

		aria-label="Alejar zoom" onclick="moveForward(-1);">

			xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">

		</svg>
	</button>
