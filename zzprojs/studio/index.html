	<style>
		:root {
			--mineColor: rgb(200, 200, 200);
			--font-sans: 'Inter', sans-serif;
			--font-light: 300;
			--font-regular: 400;
			--font-medium: 500;
			--font-semibold: 600;
			--font-bold: 700;

			--color-yellow: #FEE366;
			--color-black: #000000;
			--color-green: #466F29;
			--color-green-hover: #5AAA4F;
			--color-white: #FFFFFF;
			--color-blue: #29A9E0;
			--color-gray: #858585;
			--color-gray-200: #f2f2f2;
			--color-gray-300: #ddd;
			--color-gray-hover-bg: rgba(204, 204, 204, 0.2);
			--color-black-12: rgba(0, 0, 0, 0.12);
			--shadow-sm: 0 4px 4px rgba(0, 0, 0, 0.25);
			--filter-yellow: brightness(0) saturate(100%) invert(84%) sepia(78%) saturate(340%) hue-rotate(5deg) brightness(104%) contrast(103%);

			--principalColor: var(--color-yellow);
			--color-ProgressBar: #ccc;
			--border-progressBar: 30px 0px 0px 30px;
		}

		.btn-circular {
			padding: 0.3125rem;
			width: 2.4375rem;
			height: 2.4375rem;
			display: flex;
			align-items: center;
			justify-content: center;
			border: none;
			background-color: var(--color-yellow);
			color: var(--color-black);
			font-size: 1.125rem;
			transition: background-color 0.2s ease, color 0.2s ease;
		}

		.btn-circular:hover,
		.btn-circular:active {
			background-color: var(--color-black);
			color: var(--color-yellow);
		}

		.btn-circular:hover img,
		.btn-circular:active img {
			filter: var(--filter-yellow);
		}

		#logosOficial {
			position: fixed;
			left: 50%;
			bottom: 15px;
			transform: translateX(-50%);
			width: 100%;
			max-width: 750px;
			height: auto;
			z-index: 40;
			padding: 0.6875rem 0.5625rem;
			/* 11px TB, 9px LR */
			border-radius: 50px;
			/* 9px X, 11px Y */
			background-color: white;
		}

		#logosOficial img {
			max-width: 100%;
			height: auto;
			display: block;
			margin: 0 auto;
		}

		@media (max-width: 600px) {
			#logosOficial {
				left: 0;
				right: 0;
				transform: none;
				width: 100%;
				bottom: 10px;
			}
		}
	</style>

			}, 1000);
			window.close();
		} 
	</script>
